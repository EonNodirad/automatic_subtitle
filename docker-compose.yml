services:

  qdrant:
    image: qdrant/qdrant:v1.16.0
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  backend:
    build: ./backend_python
    restart: always
    env_file:
      - ./backend_python/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./backend_python/memory:/app/memory
    depends_on:
      - qdrant
      - tts
      - stt
      - neo4j
  tts:
    build: ./backend_python/tts
    restart: always
    env_file:
      - ./backend_python/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8002:8002"
  stt:
    build: ./backend_python/stt
    restart: always
    env_file:
      - ./backend_python/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3004:3000"
    env_file:
      - ./frontend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
  neo4j:
    image: neo4j:5.26.0
    restart: always
    ports:
      - "7474:7474" # Interface Web (Neo4j Browser)
      - "7687:7687" # Port de communication (Bolt) pour Python
    environment:
      - NEO4J_AUTH=neo4j/jeanheude_password # Le login et mot de passe par défaut
      - NEO4J_PLUGINS=["apoc"] # Outils avancés pour les requêtes complexes
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
